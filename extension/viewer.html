<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="viewer.css">
</head>
<body>
<div id="minigame" class="hidden">
  <div id="header">
    <span id="timer">--:--</span>
    <span id="score">Plates: 0</span>
  </div>
  <div id="plate-container">
    <div id="plate">
      <span id="plate-text">---</span>
    </div>
  </div>
  <input id="input" type="text" maxlength="8" placeholder="Type the plate..." autocomplete="off" spellcheck="false">
  <div id="feedback"></div>
</div>
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<script src="viewer.js"></script>
</body>
</html>
